<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Track your daily habits and build streaks.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Habit Tracker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Habit Tracker</title>
  <link rel="manifest" href="manifest.json">

  <!-- ── Browser Push Notification Bridge ─────────────────────── -->
  <script>
    /**
     * Request browser notification permission.
     * Returns promise resolving to "granted" | "denied" | "default".
     */
    function requestNotificationPermission() {
      if (!('Notification' in window)) {
        return Promise.resolve('not_supported');
      }
      return Notification.requestPermission();
    }

    /**
     * Show a real OS-level browser notification.
     * Called from Flutter via dart:js interop.
     */
    function showBrowserNotification(title, body, icon) {
      if (!('Notification' in window)) return;
      var effectiveIcon = icon || '/icons/Icon-192.png';

      if (Notification.permission === 'granted') {
        var n = new Notification(title, {
          body: body,
          icon: effectiveIcon,
          badge: effectiveIcon,
          tag: 'habit-tracker',          // Replaces previous notification with same tag
          renotify: false,
        });
        // Auto-close after 6 seconds
        setTimeout(function() { n.close(); }, 6000);
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then(function(permission) {
          if (permission === 'granted') {
            showBrowserNotification(title, body, icon);
          }
        });
      }
    }

    /**
     * Get current notification permission status.
     */
    function getNotificationPermission() {
      if (!('Notification' in window)) return 'not_supported';
      return Notification.permission;
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
