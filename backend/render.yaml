services:
  - type: web
    name: habit-tracker-api
    plan: free
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: habit-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: habit-db
    plan: free
